<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Palavra de Deus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:        #c9a84c;
      --gold-light:  #f0d080;
      --gold-dim:    #5a3d10;
      --parchment:   #f5ead6;
      --ink:         #1a120b;
      --bg:          #0e0a05;
      --card-dark:   #150e04;
      --card-mid:    #1e1408;
      --text-study:  #c8b890;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'EB Garamond', Georgia, serif;
      overflow-x: hidden;
      padding: 28px 0;
    }

    /* ── Stars ── */
    #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    #stars span {
      position: absolute; border-radius: 50%; background: #fff; opacity: 0;
      animation: twinkle var(--d,3s) var(--dl,0s) infinite ease-in-out;
    }
    @keyframes twinkle {
      0%,100% { opacity:0; transform:scale(1); }
      50%      { opacity:var(--op,.5); transform:scale(1.4); }
    }

    /* ── Layout ── */
    .wrap {
      position: relative; z-index: 1;
      width: min(680px, 93vw);
      display: flex; flex-direction: column;
    }

    /* ── Cards ── */
    .card {
      background: linear-gradient(160deg, var(--card-mid) 0%, var(--card-dark) 100%);
      border: 1px solid var(--gold-dim);
      padding: 52px 44px 40px;
      box-shadow: 0 0 0 1px #3a2a10, 0 0 60px 8px rgba(201,168,76,.07), 0 32px 80px rgba(0,0,0,.6);
      text-align: center;
    }
    .card-verse  { border-radius: 4px 4px 0 0; }
    .card-study  { border-top: none; border-radius: 0 0 4px 4px; padding-top: 36px; padding-bottom: 40px; }

    .line {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 32px;
      width: 80%;
    }
    .line-sm {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
      margin: 0 auto 28px;
      width: 60%;
    }

    /* ── Typography ── */
    h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(.9rem, 3vw, 1.3rem);
      color: var(--gold-light);
      letter-spacing: .08em;
      margin-bottom: 36px;
    }
    .label {
      font-family: 'Cinzel Decorative', serif;
      font-size: .76rem;
      color: var(--gold);
      letter-spacing: .16em;
      margin-bottom: 20px;
    }

    /* ── Verse area ── */
    .verse-area {
      min-height: 160px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; margin-bottom: 36px;
    }
    .placeholder { color: #4a3820; font-style: italic; font-size: 1rem; }

    #verseText {
      font-style: italic;
      font-size: clamp(1.05rem, 2.4vw, 1.3rem);
      color: var(--parchment);
      line-height: 1.82; max-width: 540px;
      opacity: 0; transform: translateY(16px);
      transition: opacity .7s ease, transform .7s ease;
    }
    #verseRef {
      font-family: 'Cinzel Decorative', serif;
      font-size: .78rem; color: var(--gold); letter-spacing: .12em;
      opacity: 0; transform: translateY(8px);
      transition: opacity .7s ease .15s, transform .7s ease .15s;
    }
    #verseText.show, #verseRef.show { opacity: 1; transform: translateY(0); }

    /* ── Study area ── */
    #studyCard { display: none; }
    #studyText {
      font-size: clamp(.95rem, 2.1vw, 1.12rem);
      color: var(--text-study);
      line-height: 1.85; max-width: 560px;
      margin: 0 auto 32px;
      opacity: 0; transform: translateY(14px);
      transition: opacity .7s ease .1s, transform .7s ease .1s;
    }
    #studyText.show { opacity: 1; transform: translateY(0); }

    /* ── Loader ── */
    .loader { display: none; flex-direction: column; align-items: center; gap: 14px; }
    .loader.active { display: flex; }
    .dots { display: flex; gap: 8px; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--gold);
      animation: bounce 1.1s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: .18s; }
    .dot:nth-child(3) { animation-delay: .36s; }
    @keyframes bounce {
      0%,80%,100% { transform:scale(.7); opacity:.4; }
      40%          { transform:scale(1.2); opacity:1; }
    }
    .loader-msg { color: #6a4e20; font-style: italic; font-size: .85rem; }

    /* ── Buttons ── */
    .btn-gold {
      font-family: 'Cinzel Decorative', serif;
      font-size: .8rem; letter-spacing: .12em;
      color: var(--ink);
      background: linear-gradient(135deg, #d4a83a 0%, #f0d080 50%, #c9922a 100%);
      border: none; border-radius: 2px;
      padding: 14px 34px; cursor: pointer;
      box-shadow: 0 4px 24px rgba(201,168,76,.35);
      transition: transform .15s, box-shadow .15s;
    }
    .btn-gold:hover  { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(201,168,76,.5); }
    .btn-gold:active { transform: translateY(1px); }
    .btn-gold:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    .btn-share {
      font-family: 'Cinzel Decorative', serif;
      font-size: .75rem; letter-spacing: .1em;
      color: var(--gold);
      background: transparent;
      border: 1px solid var(--gold-dim); border-radius: 2px;
      padding: 12px 28px; cursor: pointer;
      transition: border-color .2s, color .2s, transform .15s;
    }
    .btn-share:hover  { border-color: var(--gold); color: var(--gold-light); transform: translateY(-1px); }
    .btn-share:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* ── Error ── */
    .error { color: #c97060; font-style: italic; font-size: .85rem; max-width: 480px; line-height: 1.6; }

    /* ── Ornament ── */
    .ornament { color: #2a1c08; font-size: .66rem; letter-spacing: .48em; margin-top: 28px; }
  </style>
</head>
<body>

<div id="stars"></div>

<div class="wrap">

  <!-- VERSE CARD -->
  <div class="card card-verse">
    <div class="line"></div>
    <h1>Palavra de Deus</h1>

    <div class="verse-area">
      <p class="placeholder" id="placeholder">Pressione o botão para receber uma palavra</p>

      <div class="loader" id="loaderVerse">
        <div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
        <p class="loader-msg" id="loaderMsg">Buscando versículo...</p>
      </div>

      <p id="errorMsg" class="error" style="display:none"></p>
      <p id="verseText"></p>
      <p id="verseRef"></p>
    </div>

    <button class="btn-gold" id="btnNew" onclick="loadVersiculo()">✦ Novo Versículo ✦</button>
    <p class="ornament">✦ ✦ ✦</p>
  </div>

  <!-- STUDY CARD -->
  <div class="card card-study" id="studyCard">
    <div class="line-sm"></div>
    <p class="label">Estudo Bíblico</p>
    <p id="studyText"></p>
    <button class="btn-share" id="btnShare" onclick="shareImage()">↗ Compartilhar Imagem</button>
    <p class="ornament">✦ ✦ ✦</p>
  </div>

</div>

<script>
  // ─── CONFIG ──────────────────────────────────────────────────────────────
  // Troque pela URL do seu backend no Render/Railway após o deploy
  const API_URL = "https://palavra-biblica.onrender.com";

  // ─── Stars ───────────────────────────────────────────────────────────────
  const starsEl = document.getElementById("stars");
  for (let i = 0; i < 100; i++) {
    const s = document.createElement("span");
    const sz = Math.random() * 2.2 + 0.4;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;
      --d:${(Math.random()*4+2).toFixed(1)}s;--dl:${(Math.random()*6).toFixed(1)}s;--op:${(Math.random()*.5+.2).toFixed(2)}`;
    starsEl.appendChild(s);
  }

  // ─── State ───────────────────────────────────────────────────────────────
  let currentData = null;

  // ─── Load ─────────────────────────────────────────────────────────────────
  async function loadVersiculo() {
    const btnNew      = document.getElementById("btnNew");
    const placeholder = document.getElementById("placeholder");
    const loaderVerse = document.getElementById("loaderVerse");
    const loaderMsg   = document.getElementById("loaderMsg");
    const errorMsg    = document.getElementById("errorMsg");
    const verseText   = document.getElementById("verseText");
    const verseRef    = document.getElementById("verseRef");
    const studyCard   = document.getElementById("studyCard");
    const studyText   = document.getElementById("studyText");

    // reset
    btnNew.disabled = true;
    placeholder.style.display = "none";
    errorMsg.style.display = "none";
    verseText.classList.remove("show");
    verseRef.classList.remove("show");
    studyText.classList.remove("show");
    studyCard.style.display = "none";
    verseText.textContent = "";
    verseRef.textContent = "";
    studyText.textContent = "";
    loaderMsg.textContent = "Buscando versículo e preparando estudo...";
    loaderVerse.classList.add("active");
    currentData = null;

    try {
      const res = await fetch(`${API_URL}/api/versiculo`);
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `HTTP ${res.status}`);
      }
      const data = await res.json();
      currentData = data;

      loaderVerse.classList.remove("active");

      verseText.textContent = `"${data.versiculo}"`;
      verseRef.textContent  = `— ${data.referencia}`;
      setTimeout(() => {
        verseText.classList.add("show");
        verseRef.classList.add("show");
      }, 50);

      studyCard.style.display = "block";
      studyText.textContent = data.estudo;
      setTimeout(() => studyText.classList.add("show"), 200);

    } catch (err) {
      loaderVerse.classList.remove("active");
      errorMsg.textContent = `⚠ ${err.message}`;
      errorMsg.style.display = "block";
      placeholder.style.display = "none";
    }

    btnNew.disabled = false;
  }

  // ─── Share ────────────────────────────────────────────────────────────────
  async function shareImage() {
    if (!currentData) return;
    const btn = document.getElementById("btnShare");
    btn.disabled = true;
    btn.textContent = "Gerando imagem...";

    try {
      const { versiculo, referencia, estudo } = currentData;

      const W = 1080, H = 1350;
      const canvas = document.createElement("canvas");
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext("2d");

      // Background
      const bg = ctx.createLinearGradient(0, 0, W, H);
      bg.addColorStop(0, "#1e1408"); bg.addColorStop(1, "#0e0a05");
      ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

      const glow = ctx.createRadialGradient(540, 480, 0, 540, 480, 680);
      glow.addColorStop(0, "rgba(201,168,76,0.07)"); glow.addColorStop(1, "transparent");
      ctx.fillStyle = glow; ctx.fillRect(0, 0, W, H);

      const lineGrad = (x1, x2, y) => {
        const g = ctx.createLinearGradient(x1, y, x2, y);
        g.addColorStop(0, "transparent"); g.addColorStop(0.5, "#c9a84c"); g.addColorStop(1, "transparent");
        return g;
      };

      const drawLine = (x1, x2, y, opacity = 1) => {
        ctx.save(); ctx.globalAlpha = opacity;
        ctx.strokeStyle = lineGrad(x1, x2, y);
        ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(x1, y); ctx.lineTo(x2, y); ctx.stroke();
        ctx.restore();
      };

      function wrapText(text, maxW, fontSize, font) {
        ctx.font = `${fontSize}px ${font}`;
        return text.split(" ").reduce((lines, word) => {
          const last = lines[lines.length - 1];
          const test = last ? `${last} ${word}` : word;
          if (ctx.measureText(test).width > maxW && last) { lines.push(word); }
          else { lines[lines.length - 1] = test; }
          return lines;
        }, [""]);
      }

      drawLine(140, 940, 88);

      ctx.fillStyle = "#f0d080";
      ctx.font = "bold 40px Georgia, serif";
      ctx.textAlign = "center";
      ctx.fillText("PALAVRA DE DEUS", 540, 152);

      drawLine(340, 740, 178, 0.6);

      // Verse
      const vLines = wrapText(`"${versiculo}"`, 820, 36, "italic Georgia, serif");
      ctx.font = "italic 36px 'EB Garamond', Georgia, serif";
      ctx.fillStyle = "#f5ead6";
      let y = 255;
      for (const l of vLines) { ctx.fillText(l, 540, y); y += 54; }

      // Reference
      ctx.fillStyle = "#c9a84c";
      ctx.font = "bold 28px Georgia, serif";
      ctx.fillText(`— ${referencia}`, 540, y + 28);
      y += 90;

      drawLine(140, 940, y);
      y += 52;

      ctx.fillStyle = "#f0d080";
      ctx.font = "bold 26px Georgia, serif";
      ctx.letterSpacing = "4px";
      ctx.fillText("ESTUDO BÍBLICO", 540, y);
      ctx.letterSpacing = "0px";
      y += 46;

      const sLines = wrapText(estudo, 860, 23, "Georgia, serif");
      ctx.fillStyle = "#c8b890";
      ctx.font = "23px 'EB Garamond', Georgia, serif";
      for (const l of sLines) { y += 40; ctx.fillText(l, 540, y); }

      ctx.fillStyle = "#3a2a10";
      ctx.font = "22px Georgia, serif";
      ctx.fillText("✦  ✦  ✦", 540, 1290);
      drawLine(140, 940, 1312, 0.8);

      canvas.toBlob(async (blob) => {
        const file = new File([blob], "palavra-biblica.png", { type: "image/png" });
        if (navigator.canShare?.({ files: [file] })) {
          await navigator.share({ files: [file], title: referencia, text: `${versiculo} — ${referencia}` });
        } else {
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a"); a.href = url; a.download = "palavra-biblica.png"; a.click();
          URL.revokeObjectURL(url);
        }
        btn.disabled = false; btn.textContent = "↗ Compartilhar Imagem";
      }, "image/png");

    } catch (err) {
      console.error(err);
      btn.disabled = false; btn.textContent = "↗ Compartilhar Imagem";
    }
  }
</script>
</body>
</html>
